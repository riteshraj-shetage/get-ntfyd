services:
  ntfy:
    image: binwiederhier/ntfy:v2.19.2
    container_name: ntfy
    restart: unless-stopped
    command: serve
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ./ntfy/server.yml:/etc/ntfy/server.yml:ro
      - ntfy-cache:/var/cache/ntfy
      - ntfy-data:/var/lib/ntfy
    networks:
      - ntfy-network

  gateway:
    image: get-ntfyd-gateway:dev
    build:
      context: ./gateway
    container_name: gateway
    restart: unless-stopped
    networks:
      - ntfy-network
    environment:
      - NTFY_BASE_URL=${NTFY_BASE_URL:-http://ntfy}
      - DEFAULT_TENANT_ID=${DEFAULT_TENANT_ID:-default}

  caddy:
    image: caddy:2.11.2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - ntfy-network
    environment:
      - PUBLIC_HOST=${PUBLIC_HOST}
      - EMAIL=${EMAIL}
    depends_on:
      - ntfy
      - gateway

networks:
  ntfy-network:
    driver: bridge

volumes:
  ntfy-cache:
    name: ntfy-cache
  ntfy-data:
    name: ntfy-data
  caddy-data:
    name: caddy-data
  caddy-config:
    name: caddy-config