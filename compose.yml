services:
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    restart: unless-stopped
    command: serve
    environment:
      - TZ=${TZ:-UTC}
      # SMTP settings (optional, for email notifications)
      # - NTFY_SMTP_SENDER_ADDR=${SMTP_SENDER_ADDR}
      # - NTFY_SMTP_SENDER_FROM=${SMTP_SENDER_FROM}
      # - NTFY_SMTP_SENDER_USER=${SMTP_SENDER_USER}
      # - NTFY_SMTP_SENDER_PASS=${SMTP_SENDER_PASS}
      
      # Web Push settings (optional, for web push notifications)
      # - NTFY_WEB_PUSH_PUBLIC_KEY=${NTFY_WEB_PUSH_PUBLIC_KEY}
      # - NTFY_WEB_PUSH_PRIVATE_KEY=${NTFY_WEB_PUSH_PRIVATE_KEY}
      # - NTFY_WEB_PUSH_FILE=${NTFY_WEB_PUSH_FILE}
      # - NTFY_WEB_PUSH_EMAIL_ADDRESS=${NTFY_WEB_PUSH_EMAIL_ADDRESS}
    volumes:
      - ./ntfy/server.yml:/etc/ntfy/server.yml:ro
      - ntfy-cache:/var/cache/ntfy
      - ntfy-data:/var/lib/ntfy
    networks:
      - ntfy-network
    ports:
      - "127.0.0.1:2586:80"

  gateway:
    build:
      context: ./gateway
    container_name: gateway
    restart: unless-stopped
    networks:
      - ntfy-network
    # optional: keeping it private; Caddy will reach it via docker network
    # ports:
    #   - "127.0.0.1:8585:8000"
    environment:
      - NTFY_BASE_URL=${NTFY_BASE_URL:-http://ntfy}
      - DEFAULT_TENANT_ID=${DEFAULT_TENANT_ID:-default}

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - ntfy-network
    environment:
      - PUBLIC_HOST=${PUBLIC_HOST}
      - EMAIL=${EMAIL}
    depends_on:
      - ntfy
      - gateway

networks:
  ntfy-network:
    driver: bridge

volumes:
  ntfy-cache:
    name: ntfy-cache
  ntfy-data:
    name: ntfy-data
  caddy-data:
    name: caddy-data
  caddy-config:
    name: caddy-config